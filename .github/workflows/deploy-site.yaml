---
# Deploy static documentation site to gh-pages.
#
# CRITICAL: This workflow MUST preserve `index.yaml` on the gh-pages branch,
# which is published by helm/chart-releaser-action (release.yaml) and consumed
# by `helm repo add geekxflood https://geekxflood.github.io/helm-charts`.
#
# Coordination: This workflow shares the `gh-pages` concurrency group with
# release.yaml so the two never push to gh-pages simultaneously. `cancel-in-progress`
# is false so neither workflow is cancelled mid-publish — they queue instead.
#
# Note: If branch protection is enabled on `gh-pages`, the github-actions bot
# must be allowed to push. This workflow only adds/updates site files and never
# touches `index.yaml` or chart `.tgz` artifacts.

name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - "site/**"
      - ".github/workflows/deploy-site.yaml"
  workflow_dispatch:

concurrency:
  group: gh-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: site/generator/requirements.txt

      - name: Install site generator dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r site/generator/requirements.txt

      - name: Build site
        env:
          BASE_PATH: /helm-charts
        run: |
          python site/generator/build.py

      - name: Verify build output
        run: |
          set -euo pipefail
          test -d site/_build || { echo "site/_build/ missing"; exit 1; }
          test -f site/_build/index.html || { echo "index.html missing"; exit 1; }
          echo "Build output:"
          ls -la site/_build/

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: site/_build/
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to gh-pages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-checkout
          fetch-depth: 0

      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site-build

      - name: Stash Helm repo index and chart packages
        id: stash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/helm-stash"
          if [ -f gh-pages-checkout/index.yaml ]; then
            cp -a gh-pages-checkout/index.yaml "${RUNNER_TEMP}/helm-stash/index.yaml"
            echo "Stashed index.yaml"
          else
            echo "WARNING: gh-pages/index.yaml not present before deploy" >&2
          fi
          # Defensive: chart-releaser stores .tgz in Releases, not gh-pages,
          # but stash any that exist just in case.
          shopt -s nullglob
          for tgz in gh-pages-checkout/*.tgz; do
            cp -a "${tgz}" "${RUNNER_TEMP}/helm-stash/"
            echo "Stashed $(basename "${tgz}")"
          done

      - name: Sync site build into gh-pages working tree
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude='.git' \
            --exclude='index.yaml' \
            --exclude='*.tgz' \
            --exclude='README.md.bak' \
            site-build/ gh-pages-checkout/

      - name: Restore Helm repo index and chart packages
        run: |
          set -euo pipefail
          if [ -f "${RUNNER_TEMP}/helm-stash/index.yaml" ]; then
            cp -a "${RUNNER_TEMP}/helm-stash/index.yaml" gh-pages-checkout/index.yaml
            echo "Restored index.yaml"
          fi
          shopt -s nullglob
          for tgz in "${RUNNER_TEMP}"/helm-stash/*.tgz; do
            cp -a "${tgz}" gh-pages-checkout/
            echo "Restored $(basename "${tgz}")"
          done

      - name: Pre-push sanity check (index.yaml intact)
        run: |
          set -euo pipefail
          if [ ! -f gh-pages-checkout/index.yaml ]; then
            echo "FATAL: index.yaml missing from staging tree — aborting" >&2
            exit 1
          fi
          head -n1 gh-pages-checkout/index.yaml | grep -q '^apiVersion: v1' \
            || { echo "FATAL: index.yaml missing 'apiVersion: v1'"; exit 1; }
          grep -q '^entries:' gh-pages-checkout/index.yaml \
            || { echo "FATAL: index.yaml missing 'entries:'"; exit 1; }
          echo "index.yaml passes pre-push checks"

      - name: Configure git identity
        working-directory: gh-pages-checkout
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push site changes
        working-directory: gh-pages-checkout
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "No site changes to publish — skipping commit."
            exit 0
          fi
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          git commit -m "chore(site): deploy ${SHORT_SHA}"
          # Retry push once in case release.yaml pushed index.yaml concurrently
          # (concurrency group should prevent this, but be defensive).
          for attempt in 1 2 3; do
            if git push origin gh-pages; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; rebasing and retrying..."
            git fetch origin gh-pages
            git rebase origin/gh-pages || {
              echo "Rebase failed; aborting"; exit 1;
            }
          done
          echo "FATAL: failed to push gh-pages after 3 attempts" >&2
          exit 1

      - name: Post-deploy verification — index.yaml still served
        run: |
          set -euo pipefail
          rm -rf verify-clone
          git clone --depth 1 --branch gh-pages \
            "https://github.com/${GITHUB_REPOSITORY}.git" verify-clone
          if [ ! -f verify-clone/index.yaml ]; then
            echo "FATAL: index.yaml absent from gh-pages after deploy" >&2
            exit 1
          fi
          head -n1 verify-clone/index.yaml | grep -q '^apiVersion: v1' || {
            echo "FATAL: gh-pages/index.yaml missing 'apiVersion: v1'" >&2
            exit 1
          }
          grep -q '^entries:' verify-clone/index.yaml || {
            echo "FATAL: gh-pages/index.yaml missing 'entries:'" >&2
            exit 1
          }
          echo "Verified: index.yaml is intact on gh-pages."
