---
# Plex Media Server Helm Chart

enabled: false

replicaCount: 1

image:
  repository: linuxserver/plex
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

# GPU Configuration for hardware transcoding
gpu:
  enabled: false
  runtimeClass: nvidia
  count: 1

env: []

service:
  type: ClusterIP
  port: 32400

cfTunnel:
  enabled: false
  tunnelRef: {}
  subjects: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  hosts: []

# Gateway API HTTPRoute (vanilla Kubernetes Gateway API)
# Works with Cilium Gateway API, Istio, Envoy Gateway, etc.
# Cilium notes: parentRefs[*].port is ignored — use sectionName to target a listener.
# Cross-namespace backendRefs require a ReferenceGrant in the backend namespace.
httpRoute:
  enabled: false
  annotations: {}
  labels: {}
  # Gateway (or Listener) references this route attaches to
  parentRefs: []
    # - name: cilium-gateway
    #   namespace: gateway-system
    #   sectionName: https
  hostnames: []
    # - plex.example.com
  # Routing rules. backendRefs default to this chart's service + service.port when omitted.
  rules: []
    # - matches:
    #     - path:
    #         type: PathPrefix
    #         value: /
    #   backendRefs:
    #     - {}

resources: {}

autoscaling:
  enabled: false

# Config PVC for /config (server database, plugin state, thumbnails).
# The chart creates this claim; reference it from `volumes:` to mount it.
configPvc:
  # Set false to skip creating the PVC (bring your own claim instead)
  enabled: true
  # Claim name. Empty string defaults to "<fullname>-config"
  # (e.g. "plex-config" for a release named "plex").
  name: ""
  # StorageClass for the claim. Empty string omits the field entirely,
  # letting the cluster's default StorageClass provision the volume.
  storageClassName: ""
  # Requested capacity. Plex metadata and thumbnails grow with library size.
  size: 200Gi
  # Access modes for the claim.
  accessModes:
    - ReadWriteOnce

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
