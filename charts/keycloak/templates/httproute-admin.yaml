{{- if and .Values.httpRoute.enabled .Values.httpRoute.admin.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "keycloak.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin-httproute
    {{- with .Values.httpRoute.admin.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httpRoute.admin.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.httpRoute.admin.parentRefs }}
    - name: {{ .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
      {{- with .kind }}
      kind: {{ . }}
      {{- end }}
      {{- with .group }}
      group: {{ . }}
      {{- end }}
      {{- with .port }}
      port: {{ . }}
      {{- end }}
    {{- end }}
  {{- with .Values.httpRoute.admin.hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.admin.rules }}
    - {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .timeouts }}
      timeouts:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        {{- range .backendRefs }}
        - name: {{ .name | default (printf "%s-service" (include "keycloak.fullname" $)) }}
          port: {{ .port | default ($.Values.service.port | default 8080) }}
          {{- with .weight }}
          weight: {{ . }}
          {{- end }}
          {{- with .namespace }}
          namespace: {{ . }}
          {{- end }}
          {{- with .kind }}
          kind: {{ . }}
          {{- end }}
          {{- with .group }}
          group: {{ . }}
          {{- end }}
          {{- with .filters }}
          filters:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
    {{- end }}
{{- end }}
