---
replicaCount: 1

image:
  repository: josh5/unmanic
  pullPolicy: IfNotPresent
  tag: ""
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

env: []
envFrom: []

runtime:
  enabled: false
  name: ""

service:
  type: ClusterIP
  port: 8888

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Gateway API HTTPRoute (vanilla Kubernetes Gateway API)
# Works with Cilium Gateway API, Istio, Envoy Gateway, etc.
httpRoute:
  enabled: false
  annotations: {}
  labels: {}
  # Gateway (or Listener) references this route attaches to
  parentRefs: []
    # - name: cilium-gateway
    #   namespace: gateway-system
    #   sectionName: https
  hostnames: []
    # - unmanic.example.com
  # Routing rules. backendRefs default to this chart's service + service.port when omitted.
  rules: []
    # - matches:
    #     - path:
    #         type: PathPrefix
    #         value: /
    #   backendRefs:
    #     - {}

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
