---
# Tunarr Helm Chart
# Create live TV channels from media on your Plex/Jellyfin/Emby servers
# Built-in HDHomeRun emulation for Plex DVR integration

enabled: false

replicaCount: 1

image:
  # registry: Optional container registry (e.g., ghcr.io, docker.io)
  # If not set, defaults to Docker Hub
  registry: ""
  repository: chrisbenincasa/tunarr
  pullPolicy: IfNotPresent
  # tag: Overrides the image tag (default is Chart appVersion)
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

# GPU Configuration for hardware transcoding (Nvidia)
# Requires Nvidia Container Toolkit configured on the host
gpu:
  enabled: false
  runtimeClass: nvidia
  count: 1

# Environment variables
env: []
# Example:
#   - name: TZ
#     value: "UTC"
#   - name: LOG_LEVEL
#     value: "info"

envFrom: []

service:
  type: ClusterIP
  # Tunarr web UI and HDHomeRun emulator port
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# CloudFlare Tunnel integration
# Gateway API HTTPRoute (vanilla Kubernetes Gateway API)
# Works with Cilium Gateway API, Istio, Envoy Gateway, etc.
# Cilium notes: parentRefs[*].port is ignored — use sectionName to target a listener.
# Cross-namespace backendRefs require a ReferenceGrant in the backend namespace.
httpRoute:
  enabled: false
  annotations: {}
  labels: {}
  # Gateway (or Listener) references this route attaches to
  parentRefs: []
    # - name: cilium-gateway
    #   namespace: gateway-system
    #   sectionName: https
  hostnames: []
    # - tunarr.example.com
  # Routing rules. backendRefs default to this chart's service + service.port when omitted.
  rules: []
    # - matches:
    #     - path:
    #         type: PathPrefix
    #         value: /
    #   backendRefs:
    #     - {}

cfTunnel:
  enabled: false
  tunnelRef: {}
  subjects: []

resources: {}
# Example:
#   requests:
#     cpu: 100m
#     memory: 256Mi
#   limits:
#     cpu: 2000m
#     memory: 2Gi

autoscaling:
  enabled: false

# Volumes - override for deployment-specific PVC names
volumes: []
# Example:
#   - name: config
#     persistentVolumeClaim:
#       claimName: tunarr-config-pvc
#   - name: movies
#     persistentVolumeClaim:
#       claimName: movie-pvc

volumeMounts: []
# Example:
#   - name: config
#     mountPath: /config/tunarr
#   - name: movies
#     mountPath: /media/movies
#     readOnly: true

# Config persistence
persistence:
  enabled: false
  existingClaim: ""
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}
