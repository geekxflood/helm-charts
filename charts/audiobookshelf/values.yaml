---
# Audiobookshelf Helm Chart
# Infrastructure-agnostic configuration

enabled: true

image:
  repository: ghcr.io/advplyr/audiobookshelf
  pullPolicy: Always
  tag: "latest"

replicaCount: 1

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Environment variables
env: []

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Gateway API HTTPRoute (vanilla Kubernetes Gateway API)
# Works with Cilium Gateway API, Istio, Envoy Gateway, etc.
# Cilium notes: parentRefs[*].port is ignored — use sectionName to target a listener.
# Cross-namespace backendRefs require a ReferenceGrant in the backend namespace.
httpRoute:
  enabled: false
  annotations: {}
  labels: {}
  # Gateway (or Listener) references this route attaches to
  parentRefs: []
    # - name: cilium-gateway
    #   namespace: gateway-system
    #   sectionName: https
  hostnames: []
    # - audiobookshelf.example.com
  # Routing rules. backendRefs default to this chart's service + service.port when omitted.
  rules: []
    # - matches:
    #     - path:
    #         type: PathPrefix
    #         value: /
    #   backendRefs:
    #     - {}

# CloudFlare Tunnel support (optional)
cfTunnel:
  enabled: false
  tunnelRef:
    name: ""
    kind: ClusterTunnel
  subjects: []

# Persistence configuration
persistence:
  config:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
    # volumeName: ""  # For static PV binding
  metadata:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    # volumeName: ""  # For static PV binding

# Additional volumes
volumes: []

# Additional volume mounts
volumeMounts: []

# Health probes
livenessProbe:
  httpGet:
    path: /healthcheck
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthcheck
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "2000m"

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}

autoscaling:
  enabled: false

# OpenBao integration for credentials (optional)
openbao:
  enabled: false
  vaultConnectionRef: ""
  vaultAuth:
    create: false
    mount: "kubernetes"
    role: ""
    serviceAccount: ""
    tokenExpirationSeconds: 600
  staticSecret:
    enabled: false
    mount: "secret"
    path: ""
    secretName: ""
    refreshAfter: "1h"
    rolloutRestartTargets: []
