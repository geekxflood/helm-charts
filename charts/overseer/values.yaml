---
# Overseerr Helm Chart

enabled: false

replicaCount: 1

image:
  repository: lscr.io/linuxserver/overseerr
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

env: []

service:
  type: ClusterIP
  port: 5055

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  hosts: []

# Gateway API HTTPRoute (vanilla Kubernetes Gateway API)
# Works with Cilium Gateway API, Istio, Envoy Gateway, etc.
# Cilium notes: parentRefs[*].port is ignored — use sectionName to target a listener.
# Cross-namespace backendRefs require a ReferenceGrant in the backend namespace.
httpRoute:
  enabled: false
  annotations: {}
  labels: {}
  # Gateway (or Listener) references this route attaches to
  parentRefs: []
    # - name: cilium-gateway
    #   namespace: gateway-system
    #   sectionName: https
  hostnames: []
    # - overseer.example.com
  # Routing rules. backendRefs default to this chart's service + service.port when omitted.
  rules: []
    # - matches:
    #     - path:
    #         type: PathPrefix
    #         value: /
    #   backendRefs:
    #     - {}

resources: {}

autoscaling:
  enabled: false

# Bundled config PersistentVolumeClaim (templates/pvc.yaml).
# NOTE: the deployment does NOT auto-mount this claim; reference it from
# volumes / volumeMounts below.
persistence:
  enabled: true
  # Claim name. Defaults to "<fullname>-config" when empty.
  name: ""
  # StorageClass for the claim. Omitted when empty (cluster default applies).
  storageClassName: ""
  size: 5Gi
  accessModes:
    - ReadWriteOnce

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

# Deployment strategy - use Recreate for RWO volumes
strategy:
  type: Recreate
